services:
  app:
    image: jpalaparthi/demo-go-app:v0.1.0
  
    container_name: demo-app
    restart: always 
    environment:
      # Removed outer quotes so Go receives the clean string
      - DSN_URL=host=db user=postgres password=postgres dbname=simple-commerce port=5432 sslmode=disable TimeZone=Asia/Shanghai
    networks:
      - demo-app-network
    ports:
      # Added missing space after the hyphen
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simple-commerce
    networks:
      - demo-app-network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Added a healthcheck so the 'app' service knows exactly when Postgres is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple-commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer_ui
    restart: always
    ports:
      - "18080:8080"
    networks:
      - demo-app-network
    depends_on:
      - db
    
networks:
  demo-app-network:
     name: my-app-network

volumes:
  postgres_data:
  